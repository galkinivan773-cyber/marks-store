DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<header>🛍 Marks Store</header>

<div class="categories">
  <div class="cat active" onclick="filter('all')">Все</div>
  <div class="cat" onclick="filter('clothes')">Одежда</div>
  <div class="cat" onclick="filter('shoes')">Обувь</div>
</div>

<div class="products" id="products"></div>

<div class="admin" onclick="togglePanel()">+</div>

<div class="panel" id="panel">
  <input id="name" placeholder="Название">
  <input id="price" placeholder="Цена">
  <input id="category" placeholder="Категория">
  <button onclick="addProduct()">Добавить</button>
</div>

<script>
let products = [];

function render(list) {
  const box = document.getElementById("products");
  box.innerHTML = "";
  list.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <div>${p.name}</div>
        <div class="price">${p.price} ₽</div>
        <small>${p.category}</small>
      </div>
    `;
  });
}

function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;

  products.push({ name, price, category });
  render(products);

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("category").value = "";
}

function filter(cat) {
  document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
  event.target.classList.add("active");

  if (cat === "all") render(products);
  else render(products.filter(p => p.category === cat));
}

function togglePanel() {
  const panel = document.getElementById("panel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

render(products);
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  alert("JS работает");
</script>

</script>

<script src="./firebase.js"></script>
<script src="./app.js"></script>
</body>
</html>
