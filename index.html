<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1c1c1e;
            padding: 16px;
            padding-bottom: 80px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-outline {
            background: transparent;
            color: #007aff;
            border: 1.5px solid #007aff;
        }
        .btn-danger {
            background: #ff3b30;
            color: white;
        }
        .product-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .product-card img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: #f0f0f2;
            flex-shrink: 0;
        }
        .product-info {
            flex: 1;
        }
        .product-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        .product-info .price {
            font-weight: 700;
            color: #007aff;
            font-size: 17px;
        }
        .product-info .category {
            font-size: 13px;
            color: #8e8e93;
        }
        .admin-panel {
            margin-top: 20px;
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .admin-panel h2 {
            font-size: 18px;
            margin-bottom: 12px;
        }
        .admin-panel input, .admin-panel textarea, .admin-panel select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e5ea;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 10px;
            background: #f8f8fa;
            font-family: inherit;
        }
        .admin-panel textarea {
            min-height: 70px;
            resize: vertical;
        }
        .admin-panel .row {
            display: flex;
            gap: 10px;
        }
        .admin-panel .row input {
            flex: 1;
        }
        .hidden {
            display: none !important;
        }
        .admin-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .admin-actions .btn {
            font-size: 13px;
            padding: 6px 14px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1c1e;
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 15px;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8e8e93;
        }
        .empty-state p {
            margin-top: 8px;
        }
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 12px 16px;
            border-top: 1px solid #e5e5ea;
            display: flex;
            gap: 10px;
            justify-content: center;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.92);
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="header">
        <h1>🛍️ Marks Store</h1>
        <div>
            <button class="btn btn-outline" id="toggleAdminBtn" style="margin-right:6px;">🔐 Админ</button>
        </div>
    </div>

    <div id="productList"></div>

    <div id="adminPanel" class="admin-panel hidden">
        <h2>⚙️ Управление товарами</h2>
        <div id="adminLogin">
            <input type="password" id="adminPassword" placeholder="Введите пароль" />
            <button class="btn" id="loginAdminBtn">Войти</button>
        </div>
        <div id="adminControls" class="hidden">
            <input type="text" id="productName" placeholder="Название товара" />
            <textarea id="productDesc" placeholder="Описание"></textarea>
            <div class="row">
                <input type="number" id="productPrice" placeholder="Цена" step="0.01" />
                <input type="text" id="productCategory" placeholder="Категория" />
            </div>
            <input type="text" id="productImage" placeholder="Ссылка на фото (URL)" />
            <div style="display:flex; gap:10px; margin-top:6px;">
                <button class="btn" id="addProductBtn">➕ Добавить</button>
                <button class="btn btn-outline" id="cancelEditBtn" style="display:none;">Отмена</button>
            </div>
            <hr style="margin:16px 0; border-color:#e5e5ea;" />
            <div id="adminProductList"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn" id="refreshBtn">🔄 Обновить</button>
    </div>

    <script>
        // ============================================================
        // 1. КОНФИГУРАЦИЯ
        // ============================================================
        const SUPABASE_URL = 'https://grefbmfvetgtwkjbjzig.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_secret_xNefDCTM90RrOQ8DCEn7Dg_EbznZRhY';  // ← ВСТАВЬТЕ СЮДА НОВЫЙ КЛЮЧ
        const ADMIN_PASSWORD = 'admin123';

        // ============================================================
        // 2. ИНИЦИАЛИЗАЦИЯ TELEGRAM
        // ============================================================
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ============================================================
        // 3. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        function apiFetch(path, options = {}) {
            return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
                ...options,
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                    ...(options.headers || {}),
                },
            });
        }

        // ============================================================
        // 4. ЗАГРУЗКА ТОВАРОВ
        // ============================================================
        async function loadProducts() {
            try {
                const res = await apiFetch('products?select=*&order=id.desc');
                if (!res.ok) throw new Error('Ошибка загрузки');
                const data = await res.json();
                renderProducts(data);
                renderAdminProducts(data);
                return data;
            } catch (e) {
                showToast('❌ Не удалось загрузить товары');
                console.error(e);
                return [];
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productList');
            if (!products || products.length === 0) {
                container.innerHTML = `<div class="empty-state"><p>😕 Товаров пока нет</p></div>`;
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image_url || 'https://placehold.co/400x400/e5e5ea/8e8e93?text=No+Image'}" alt="${p.name}" />
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <div class="category">${p.category || 'Разное'}</div>
                        <div class="price">${Number(p.price).toFixed(2)} ₽</div>
                        <div style="font-size:13px; color:#8e8e93; margin-top:4px;">${p.description || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // 5. АДМИНКА
        // ============================================================
        let editingId = null;
        let isAdmin = false;

        function renderAdminProducts(products) {
            const container = document.getElementById('adminProductList');
            if (!products || products.length === 0) {
                container.innerHTML = `<p style="color:#8e8e93; font-size:14px;">Товаров нет</p>`;
                return;
            }
            container.innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f0f0f2;">
                    <div style="flex:1;">
                        <strong>${p.name}</strong> — ${Number(p.price).toFixed(2)} ₽
                    </div>
                    <div class="admin-actions">
                        <button class="btn btn-outline" onclick="editProduct(${p.id})" style="font-size:12px; padding:4px 12px;">✏️</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})" style="font-size:12px; padding:4px 12px;">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.editProduct = function(id) {
            const products = window._lastProducts || [];
            const p = products.find(x => x.id === id);
            if (!p) return;
            editingId = id;
            document.getElementById('productName').value = p.name;
            document.getElementById('productDesc').value = p.description || '';
            document.getElementById('productPrice').value = p.price;
            document.getElementById('productCategory').value = p.category || '';
            document.getElementById('productImage').value = p.image_url || '';
            document.getElementById('addProductBtn').textContent = '💾 Обновить';
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
            showToast('✏️ Редактирование: ' + p.name);
        };

        document.getElementById('cancelEditBtn').addEventListener('click', function() {
            editingId = null;
            document.getElementById('productName').value = '';
            document.getElementById('productDesc').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productCategory').value = '';
            document.getElementById('productImage').value = '';
            document.getElementById('addProductBtn').textContent = '➕ Добавить';
            this.style.display = 'none';
            showToast('Отменено');
        });

        document.getElementById('addProductBtn').addEventListener('click', async function() {
            const name = document.getElementById('productName').value.trim();
            const desc = document.getElementById('productDesc').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const category = document.getElementById('productCategory').value.trim();
            const image = document.getElementById('productImage').value.trim();

            if (!name || !price) {
                showToast('⚠️ Название и цена обязательны');
                return;
            }

            const payload = {
                name,
                description: desc || '',
                price,
                category: category || 'Другое',
                image_url: image || 'https://placehold.co/400x400/e5e5ea/8e8e93?text=No+Image',
            };

            try {
                let res;
                if (editingId) {
                    res = await apiFetch(`products?id=eq.${editingId}`, {
                        method: 'PATCH',
                        body: JSON.stringify(payload),
                    });
                    if (!res.ok) throw new Error('Ошибка обновления');
                    showToast('✅ Товар обновлён');
                    editingId = null;
                    document.getElementById('addProductBtn').textContent = '➕ Добавить';
                    document.getElementById('cancelEditBtn').style.display = 'none';
                } else {
                    res = await apiFetch('products', {
                        method: 'POST',
                        body: JSON.stringify(payload),
                    });
                    if (!res.ok) throw new Error('Ошибка добавления');
                    showToast('✅ Товар добавлен');
                }

                document.getElementById('productName').value = '';
                document.getElementById('productDesc').value = '';
                document.getElementById('productPrice').value = '';
                document.getElementById('productCategory').value = '';
                document.getElementById('productImage').value = '';

                await loadProducts();
            } catch (e) {
                showToast('❌ Ошибка: ' + e.message);
                console.error(e);
            }
        });

        window.deleteProduct = async function(id) {
            if (!confirm('Удалить товар?')) return;
            try {
                const res = await apiFetch(`products?id=eq.${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Ошибка удаления');
                showToast('🗑️ Товар удалён');
                await loadProducts();
            } catch (e) {
                showToast('❌ ' + e.message);
            }
        };

        // ============================================================
        // 6. АДМИН ВХОД
        // ============================================================
        document.getElementById('toggleAdminBtn').addEventListener('click', function() {
            const panel = document.getElementById('adminPanel');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                document.getElementById('adminLogin').classList.remove('hidden');
                document.getElementById('adminControls').classList.add('hidden');
                this.textContent = '🔒 Закрыть';
            } else {
                panel.classList.add('hidden');
                this.textContent = '🔐 Админ';
            }
        });

        document.getElementById('loginAdminBtn').addEventListener('click', function() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
                document.getElementById('adminPassword').value = '';
                showToast('✅ Добро пожаловать в админку!');
                loadProducts();
            } else {
                showToast('❌ Неверный пароль');
            }
        });

        // ============================================================
        // 7. ОБНОВЛЕНИЕ
        // ============================================================
        document.getElementById('refreshBtn').addEventListener('click', function() {
            loadProducts();
            showToast('🔄 Обновлено');
        });

        // ============================================================
        // 8. СТАРТ
        // ============================================================
        window._lastProducts = [];
        loadProducts();

        console.log('🛍️ Marks Store запущен!');
        console.log('🔑 Пароль админа: admin123');
    </script>
</body>
</html>
