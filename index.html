DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Marks Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .categories {
      display: flex;
      gap: 10px;
      padding: 10px;
      overflow-x: auto;
      background: white;
    }

    .cat {
      padding: 8px 12px;
      background: #eee;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
    }

    .cat.active {
      background: black;
      color: white;
    }

    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .price {
      font-weight: bold;
    }

    .admin {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
    }

    .panel {
      display: none;
      position: fixed;
      bottom: 60px;
      right: 10px;
      background: white;
      padding: 10px;
      border: 1px solid #ccc;
      width: 200px;
    }

    input {
      width: 100%;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<header>🛍 Marks Store</header>

<div class="categories">
  <div class="cat active" onclick="filter('all')">Все</div>
  <div class="cat" onclick="filter('clothes')">Одежда</div>
  <div class="cat" onclick="filter('shoes')">Обувь</div>
</div>

<div class="products" id="products"></div>

<div class="admin" onclick="togglePanel()">+</div>

<div class="panel" id="panel">
  <input id="name" placeholder="Название">
  <input id="price" placeholder="Цена">
  <input id="category" placeholder="Категория">
  <button onclick="addProduct()">Добавить</button>
</div>

<script>
let products = [];

function render(list) {
  const box = document.getElementById("products");
  box.innerHTML = "";
  list.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <div>${p.name}</div>
        <div class="price">${p.price} ₽</div>
        <small>${p.category}</small>
      </div>
    `;
  });
}

function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const category = document.getElementById("category").value;

  products.push({ name, price, category });
  render(products);

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("category").value = "";
}

function filter(cat) {
  document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
  event.target.classList.add("active");

  if (cat === "all") render(products);
  else render(products.filter(p => p.category === cat));
}

function togglePanel() {
  const panel = document.getElementById("panel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

render(products);
</script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</body>
</html>
